site_name: Sea Forward Documentation
docs_dir: docs
theme:
  name: material
  logo: assets/logo.webp
  features:
    - navigation.expand
    - content.code.copy
    - navigation.footer
  palette:
    # Mode sombre (Slate)
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    # Mode clair (Default)
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

#extra:
#  pdf_download_text: "Télécharger le PDF"

extra_css:
  - css/syntax_custom.css
  - css/extra.css

plugins:
  - search:
      lang: en
      separator: '[\s\-\.]+'
  - material/search:
      highlight: true
      highlight_threshold: 2
  - with-pdf:
 #     pdf_button_text: "📘 Télécharger PDF"
      cover: true
      cover_title: "Sea Forward Documentation"
      cover_subtitle: "Version 1.0"

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.tabbed
  - codehilite:
      guess_lang: false
      use_pygments: true
      pygments_style: monokai
  - pymdownx.inlinehilite
  - pymdownx.superfences

nav:
  - Home: index.md
  #- Introduction: introduction.md
  #- Détails du script: script.md